<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Страница не найдена</title>
    <meta name="robots" content="noindex" />
    <link
      rel="shortcut icon"
      href="https://raw.githubusercontent.com/HSEADC/Trace/1e38b37529f6102ac157dff34841560c951076d5/src/img/icons/favicon.svg"
      type="image/x-icon"
    />

  <body class="W-404">

      <div class="W-404Animation">

          alt="404 объект"
        />
        <img
          class="Q-404-Conveyor Q-404-Conveyor--1"
          src="../img/icons/Q-404-conveyor-1.png"

        />

        <img
          class="Q-404-Conveyor Q-404-Conveyor--2"
          src="../img/icons/Q-404-conveyor-2.png"
          alt="конвейер"
        />
      </div>

      <img class="A-404-img" src="../img/icons/A-404-Text.png" alt="ошибка" />

      <div class="W-404Titile-Button">
        <h1 class="A-404Titile">
          страница ушла в переработку. мы уже сортируем <br />
          контент, прессуем битый код, переплавляем старый URL
        </h1>

        <a
          class="A-MainPage-button button-yellow"
          href="https://hseadc.github.io/Trace/"

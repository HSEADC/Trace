<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trace — Игра</title>
    <meta name="title" content="Trace — Игра" />
    <meta
      name="description"
      content="Игра Trace по сортировке мусора: ловите отходы и отправляйте их в правильные контейнеры. Лёгкий способ потренировать экопривычки и понять, что сдавать в переработку."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hseadc.github.io/Trace/" />
    <meta property="og:title" content="Trace — Игра" />
    <meta
      property="og:description"
      content="Игра Trace по сортировке мусора: ловите отходы и отправляйте их в правильные контейнеры. Лёгкий способ потренировать экопривычки и понять, что сдавать в переработку."
    />
    <meta
      property="og:image"
      content="https://github.com/HSEADC/Trace/blob/main/src/img/meta-img/game.jpg?raw=true"
    />

    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hseadc.github.io/Trace/" />
    <meta property="twitter:title" content="Trace — Игра" />
    <meta
      property="twitter:description"
      content="Игра Trace по сортировке мусора: ловите отходы и отправляйте их в правильные контейнеры. Лёгкий способ потренировать экопривычки и понять, что сдавать в переработку."
    />
    <meta
      property="twitter:image"
      content="https://github.com/HSEADC/Trace/blob/main/src/img/meta-img/game.jpg?raw=true"
    />

    <link
      rel="shortcut icon"
      href="../img/icons/favicon.svg"
      type="image/x-icon"
    />
  </head>

  <body class="W_Game">
    <header></header>

    <main>
      <section class="O-GameScreen">
        <div class="W-GameLayout">
          <div class="W-GamePanelLeft">
            <div class="O-GamePanelLeft">
              <img
                class="A-GamePanelTitle A-GamePanelTitle-Goal"
                src="../img/icons/A-Goal-Text.png"
                alt="Цель"
              />

              <div class="M-GameGoalBox">
                <div class="W-GameGoalItem">
                  <img
                    class="A-GameGoalIcon"
                    src="../img/game/A-GameGoalIcon1.png"
                    alt="мусорная корзина"
                  />
                </div>

                <div class="W-GameGoalItem">
                  <img
                    class="A-GameGoalIcon"
                    src="../img/game/A-GameGoalIcon2.png"
                    alt="бутылка"
                  />
                </div>
              </div>

              <div class="M-GameLinesBox">
                <span class="A-GamePanelTitle A-GamePanelTitle-Lines">
                  <span id="lines-value">6</span> LINES
                </span>
              </div>
            </div>

            <div class="O-GamePanelRight-Mobile">
              <img
                class="A-GamePanelTitle A-GamePanelTitle-Goal"
                src="../img/icons/A-Next-Text.png"
                alt="Следующий"
              />

              <div class="M-GameNextBox">
                <canvas
                  id="next-piece-mobile"
                  class="A-NextPieceCanvas"
                  width="120"
                  height="120"
                ></canvas>
              </div>

              <div class="M-GameControls">
                <button
                  class="A-GameControlButton"
                  id="start-button-mobile"
                  type="button"
                  aria-label="старт"
                >
                  <img
                    class="A-GameControlIcon"
                    src="../img/icons/A-Play-Icon.png"
                    alt="старт"
                  />
                </button>

                <button
                  class="A-GameControlButton"
                  id="pause-button-mobile"
                  type="button"
                  aria-label="пауза"
                >
                  <img
                    class="A-GameControlIcon"
                    src="../img/icons/A-Pause-Icon.png"
                    alt="пауза"
                  />
                </button>
              </div>
            </div>
          </div>

          <div class="W-GameField">
            <div class="O-GameField">
              <canvas
                id="tetris-board"
                class="A-GameBoardCanvas"
                width="400"
                height="400"
              ></canvas>

              <div id="lose-modal" class="O-GameModal O-GameModal-Hidden">
                <div class="M-GameModalCard">
                  <div class="M-GameModalTopButtons">
                    <button
                      class="A-GameModalTopButton"
                      id="lose-modal-restart-top"
                      type="button"
                      aria-label="ещё раз"
                    >
                      <img
                        src="../img/icons/A-Restart-Icon.png"
                        alt="ещё раз"
                      />
                    </button>
                  </div>

                  <img
                    class="A-GameModalMainImage"
                    src="../img/icons/A-Lose-Earth-Heart.png"
                    alt="земля и разбитое сердце"
                  />

                  <img
                    class="A-GameModalOopsImage"
                    src="../img/icons/A-Oops-Text.png"
                    alt="ой-ой"
                  />
                </div>
              </div>

              <div id="win-modal" class="O-GameModal O-GameModal-Hidden">
                <div class="M-GameModalCard">
                  <div class="M-GameModalTopButtons">
                    <button
                      class="A-GameModalTopButton"
                      id="win-modal-restart-top"
                      type="button"
                      aria-label="ещё раз"
                    >
                      <img
                        src="../img/icons/A-Restart-Icon.png"
                        alt="ещё раз"
                      />
                    </button>
                  </div>

                  <img
                    class="A-GameModalMainImage"
                    src="../img/icons/A-Win-Img.png"
                    alt="счастливая земля и сердце"
                  />

                  <img
                    class="A-GameModalOopsImage"
                    src="../img/icons/A-Hooray-Text.png"
                    alt="ура"
                  />

                  <div class="A-GameModalResultText">ПОБЕДА</div>

                  <div class="M-GameModalButtons">
                    <button
                      class="A-GameModalActionButton"
                      id="win-modal-restart"
                      type="button"
                      aria-label="ещё раз"
                    >
                      <img
                        class="A-GameModalActionIcon"
                        src="../img/icons/A-Restart-Icon.png"
                        alt="ещё раз"
                      />
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="W-GamePanelRight">
            <div class="O-GamePanelRight">
              <img
                class="A-GamePanelTitle A-GamePanelTitle-Goal"
                src="../img/icons/A-Next-Text.png"
                alt="Следующий"
              />

              <div class="M-GameNextBox">
                <canvas
                  id="next-piece"
                  class="A-NextPieceCanvas"
                  width="120"
                  height="120"
                ></canvas>
              </div>

              <div class="M-GameControls">
                <button
                  class="A-GameControlButton"
                  id="start-button"
                  type="button"
                  aria-label="старт"
                >
                  <img
                    class="A-GameControlIcon"
                    src="../img/icons/A-Play-Icon.png"
                    alt="старт"
                  />
                </button>

                <button
                  class="A-GameControlButton"
                  id="pause-button"
                  type="button"
                  aria-label="пауза"
                >
                  <img
                    class="A-GameControlIcon"
                    src="../img/icons/A-Pause-Icon.png"
                    alt="пауза"
                  />
                </button>
              </div>

              <div class="M-GameStatsBox">
                <div class="W-GameStatItem">
                  <span class="A-GamePanelTitle A-GamePanelTitle-Level">
                    <span id="level-value">5</span> LEVEL
                  </span>
                </div>

                <div class="W-GameStatItem">
                  <span class="A-GamePanelTitle A-GamePanelTitle-Score">
                    <span id="score-value">2419</span> SCORE
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>

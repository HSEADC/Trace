  <body class="W_Game">
    <header></header>
    <main>
      <section class="O-GameScreen">
        <div class="W-GameLayout">
          <div class="W-GamePanelLeft">
            <div class="O-GamePanelLeft">
              <h1 class="A-GamePanelTitle A-GamePanelTitle-Goal">GOAL</h1>

              <div class="M-GameGoalBox">
                <div class="W-GameGoalItem">
                  <img class="A-GameGoalIcon" src="#" alt="мусорная корзина" />
                  <span class="A-GameGoalValue" id="goal-paper-value">11</span>
                </div>

                <div class="W-GameGoalItem">
                  <img class="A-GameGoalIcon" src="#" alt="бутылка" />
                  <span class="A-GameGoalValue" id="goal-plastic-value">5</span>
                </div>
              </div>

              <div class="M-GameLinesBox">
                <span class="A-GamePanelTitle A-GamePanelTitle-Lines">
                  <span id="lines-value">6</span> LINES
                </span>
              </div>
            </div>
          </div>

          <div class="W-GameField">
            <div class="O-GameField">
              <canvas
                id="tetris-board"
                class="A-GameBoardCanvas"
                width="300"
                height="600"
              ></canvas>
            </div>
          </div>

          <div class="W-GamePanelRight">
            <div class="O-GamePanelRight">
              <h2 class="A-GamePanelTitle A-GamePanelTitle-Next">NEXT</h2>

              <div class="M-GameNextBox">
                <canvas
                  id="next-piece"
                  class="A-NextPieceCanvas"
                  width="120"
                  height="120"
                ></canvas>
              </div>

              <div class="M-GameControls">
                <button
                  class="A-GameControlButton"
                  id="start-button"
                  type="button"
                  aria-label="старт"
                >
                  <img class="A-GameControlIcon" src="#" alt="старт" />
                </button>

                <button
                  class="A-GameControlButton"
                  id="menu-button"
                  type="button"
                  aria-label="меню"
                >
                  <img class="A-GameControlIcon" src="#" alt="меню" />
                </button>

                <button
                  class="A-GameControlButton"
                  id="pause-button"
                  type="button"
                  aria-label="пауза"
                >
                  <img class="A-GameControlIcon" src="#" alt="пауза" />
                </button>
              </div>

              <div class="M-GameStatsBox">
                <div class="W-GameStatItem">
                  <span class="A-GamePanelTitle A-GamePanelTitle-Level">
                    <span id="level-value">5</span> LEVEL
                  </span>
                </div>

                <div class="W-GameStatItem">
                  <span class="A-GamePanelTitle A-GamePanelTitle-Score">
                    <span id="score-value">2419</span> SCORE
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>

            <div class="W-Filter-Buttons">
              <button class="A-Filter-Button">

                  src="../img/articles/A-Filter-Icon.svg"

              <button
                class="A-Filter-Choose-Button is-active-button"
                data-category="all"

                все
              </button>

              <button class="A-Filter-Choose-Button" data-category="recycling">

              </button>

              <button
                class="A-Filter-Choose-Button"
                data-category="electronics"
              >
                электроника
              </button>

              <button
                class="A-Filter-Choose-Button"
                data-category="saving money"
              >
                выгода
              </button>

              <button
                class="A-Filter-Choose-Button"
                data-category="organic waste"
              >
                органические отходы
              </button>

              <button
                class="A-Filter-Choose-Button"
                data-category="daily habits"
              >
                бытовые привычки
              </button>

              <button class="A-Filter-Choose-Button" data-category="resources">
                природные ресурсы
              </button>

              <button
                class="A-Filter-Choose-Button"
                data-category="waste reduction"
              >
                осознанная переработка
              </button>
            </div>
          </div>
        </div>

                какая идеальная <br />
                температура для стирки?
